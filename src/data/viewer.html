<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASHB2 Tick Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #9cdcfe;
        }
        .control-panel {
            background-color: #252526;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .file-input-wrapper {
            margin-bottom: 20px;
        }
        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            opacity: 0.5;
            pointer-events: none;
        }
        .slider-wrapper.active {
            opacity: 1;
            pointer-events: auto;
        }
        input[type="range"] {
            flex-grow: 1;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #252526;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #3e3e42;
        }
        th {
            background-color: #333333;
            color: #4fc1ff;
            position: sticky;
            top: 0;
        }
        tr:hover {
            background-color: #2a2d2e;
        }
        .stats-summary {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-weight: bold;
            color: #b5cea8;
        }
        #error-msg {
            color: #f48771;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>ASHB2 Tick Viewer</h1>

    <div class="control-panel">
        <div class="file-input-wrapper">
            <label for="fileLoader"><strong>1. Select <code>tick_history.jsonl</code>:</strong></label><br><br>
            <input type="file" id="fileLoader" accept=".jsonl,.txt" />
            <div id="error-msg"></div>
        </div>

        <div class="slider-wrapper" id="sliderContainer">
            <label for="tickSlider"><strong>2. Scrub through Ticks:</strong></label>
            <input type="range" id="tickSlider" min="0" max="0" value="0">
            <span id="tickValueDisplay">Tick 0 / 0</span>
        </div>

        <div class="stats-summary" id="statsSummary"></div>
    </div>

    <table id="entityTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Sex</th>
                <th>Age</th>
                <th>Health</th>
                <th>Happiness</th>
                <th>Stress</th>
                <th>Mental Health</th>
                <th>Loneliness</th>
                <th>Boredom</th>
                <th>Anger</th>
                <th>Hygiene</th>
                <th>Disease</th>
                <th>Position (X, Y)</th>
                <th>Personality (E, A, C, N, O)</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr>
                <td colspan="15" style="text-align: center;">No data loaded.</td>
            </tr>
        </tbody>
    </table>

    <script>
        let tickData = []; // Array to hold parsed JSON objects

        document.getElementById('fileLoader').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function(e) {
                const contents = e.target.result;
                const lines = contents.split('\n');

                tickData = [];
                let parsedCount = 0;

                for (let line of lines) {
                    if (line.trim() === '') continue;
                    try {
                        const parsed = JSON.parse(line);
                        tickData.push(parsed);
                        parsedCount++;
                    } catch (err) {
                        console.error("Error parsing line: ", line, err);
                    }
                }

                if (tickData.length > 0) {
                    document.getElementById('error-msg').innerText = `Successfully loaded ${parsedCount} ticks.`;

                    const slider = document.getElementById('tickSlider');
                    slider.max = tickData.length - 1;
                    slider.value = 0;

                    document.getElementById('sliderContainer').classList.add('active');

                    renderTick(0);
                } else {
                    document.getElementById('error-msg').innerText = "No valid data found in the selected file.";
                    document.getElementById('sliderContainer').classList.remove('active');
                }
            };

            reader.onerror = function() {
                document.getElementById('error-msg').innerText = "Error reading file.";
            };

            reader.readAsText(file);
        });

        document.getElementById('tickSlider').addEventListener('input', function(e) {
            renderTick(parseInt(e.target.value));
        });

        function renderTick(index) {
            if (index < 0 || index >= tickData.length) return;

            const data = tickData[index];
            document.getElementById('tickValueDisplay').innerText = `Tick ${index} (Day: ${data.day}) / ${tickData.length - 1}`;

            document.getElementById('statsSummary').innerHTML = `
                <span>Total Entities: ${data.entityCount}</span>
                <span>Day: ${data.day}</span>
            `;

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; // clear

            if (!data.entities || data.entities.length === 0) {
                tbody.innerHTML = '<tr><td colspan="15" style="text-align: center;">No entities in this tick.</td></tr>';
                return;
            }

            data.entities.forEach(ent => {
                const tr = document.createElement('tr');

                tr.innerHTML = `
                    <td>${ent.id}</td>
                    <td><b>${ent.name}</b></td>
                    <td>${ent.sex}</td>
                    <td>${ent.age}</td>
                    <td style="color: ${ent.health < 50 ? '#f48771' : '#b5cea8'}">${ent.health.toFixed(1)}</td>
                    <td>${ent.happiness.toFixed(1)}</td>
                    <td>${ent.stress.toFixed(1)}</td>
                    <td>${ent.mentalHealth.toFixed(1)}</td>
                    <td>${ent.loneliness.toFixed(1)}</td>
                    <td>${ent.boredom.toFixed(1)}</td>
                    <td>${ent.anger.toFixed(1)}</td>
                    <td>${ent.hygiene.toFixed(1)}</td>
                    <td>${ent.disease === -1 ? 'None' : ent.disease}</td>
                    <td>(${ent.posX.toFixed(1)}, ${ent.posY.toFixed(1)})</td>
                    <td style="font-size: 0.9em; color: #9cdcfe">
                        E:${ent.personality.e.toFixed(0)},
                        A:${ent.personality.a.toFixed(0)},
                        C:${ent.personality.c.toFixed(0)},
                        N:${ent.personality.n.toFixed(0)},
                        O:${ent.personality.o.toFixed(0)}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
